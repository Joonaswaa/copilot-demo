[theme]
base = "light"
primaryColor = "#002CAC"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F4FA"
textColor = "#1B1B1B"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#002CAC"
secondaryBackgroundColor = "#001F8C"
textColor = "#FFFFFF"

[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = true

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
